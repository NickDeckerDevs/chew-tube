# 5/24/2026 - nick decker | downgrade to node 22 lts
# CHANGED
# - node-version: 24 → 22 LTS; better-sqlite3@9.6.0 has no prebuilt binary for Node 24 on Linux
#   and the node-gyp fallback fails; Node 22 LTS has prebuilt binaries and is supported until April 2027
# - FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 kept — only affects runner internal actions, not our code
#
# 5/23/2026 - nick decker | node 24 migration
# CHANGED
# - Bumped node-version to 24 (Node 20 actions deprecated June 2nd 2026)
# - Added FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env to opt actions runner into Node 24
#
# 5/22/2026 - nick decker | schedule update
# CHANGED
# - Cron updated from 7am CT (0 12 * * *) to 5am EST (0 10 * * * UTC)
#
# 5/22/2026 - nick decker | phase development
# ADDED
# - Scheduled GitHub Actions workflow — runs daily at 5am EST (0 10 * * * UTC)
# - `workflow_dispatch` trigger for manual test runs via GitHub UI
# - Injects YOUTUBE_API_KEY, ANTHROPIC_API_KEY, RESEND_API_KEY, DIGEST_TO_EMAIL from repo secrets

name: Daily YouTube Digest

on:
  schedule:
    - cron: '0 10 * * *'  # 5am EST (UTC-5)
  workflow_dispatch:        # manual trigger via GitHub UI for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run digest
        run: npx tsx src/digest.ts
        working-directory: backend
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
